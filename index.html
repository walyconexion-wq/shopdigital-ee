  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #ffffff;
      color: #0A224E;
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      -webkit-font-smoothing: antialiased;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Estilo Base para Botones con Volumen */
    .btn-volume {
      background: #E8F5EA;
      border: 1.5px solid #0A224E;
      border-bottom-width: 4.5px;
      box-shadow:
        0 10px 20px -8px rgba(10, 34, 78, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      top: 0;
      cursor: pointer;
    }

    .btn-volume:hover {
      top: -2px;
      border-bottom-width: 6px;
      background: #f0faf2;
      box-shadow: 0 14px 28px -10px rgba(10, 34, 78, 0.18);
    }

    .btn-volume:active {
      top: 3.5px;
      border-bottom-width: 1px;
      box-shadow: 0 4px 6px -2px rgba(10, 34, 78, 0.1);
    }

    .category-btn {
      border-radius: 2.4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.6rem;
    }

    .share-btn {
      border-radius: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    .fade-up-item {
      animation: fadeUp 0.7s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Animación de Catálogo (Marquee Suave) */
    .animate-delicate-marquee {
      display: flex;
      width: max-content;
      animation: delicateMarquee 45s linear infinite;
    }

    @keyframes delicateMarquee {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    /* Animación Error Password */
    .animate-shake {
      animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
    }

    @keyframes shake {

      10%,
      90% {
        transform: translate3d(-1px, 0, 0);
      }

      20%,
      80% {
        transform: translate3d(2px, 0, 0);
      }

      30%,
      50%,
      70% {
        transform: translate3d(-4px, 0, 0);
      }

      40%,
      60% {
        transform: translate3d(4px, 0, 0);
      }
    }

    /* Animación Ken Burns */
    @keyframes kenburns {
      0% {
        transform: scale(1);
      }

      100% {
        transform: scale(1.08);
      }
    }

    .animate-kenburns {
      animation: kenburns 6s ease-in-out infinite alternate;
      will-change: transform;
      image-rendering: -webkit-optimize-contrast;
      transform: translateZ(0);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    /* Glassmorphism Header */
    .glass-header {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.15);
    }

    .glass-header h1 span,
    .glass-header p {
      color: #FFFFFF !important;
      font-weight: 900 !important;
      text-shadow: 0px 2px 10px rgba(0, 0, 0, 0.8);
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6));
    }

    .glass-header svg {
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.4));
    }

    .text-shadow-premium {
      text-shadow: 0px 2px 10px rgba(0, 0, 0, 0.8);
      filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
    }

    /* Botón Vidrio 3D Táctil - Versión Cuadrada HD (Neón Violeta) */
    .glass-button-3d {
      background: linear-gradient(135deg, rgba(138, 43, 226, 0.25) 0%, rgba(138, 43, 226, 0.05) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1.5px solid rgba(138, 43, 226, 0.6);
      border-radius: 1.6rem;
      box-shadow:
        inset 0 4px 6px rgba(255, 255, 255, 0.3),
        0 20px 40px rgba(0, 0, 0, 0.6),
        0 10px 20px rgba(138, 43, 226, 0.25),
        0 0 15px rgba(138, 43, 226, 0.4);
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      cursor: pointer;
      position: relative;
      top: -6px;
      will-change: transform;
      transform: translateZ(0);
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }

    .glass-button-3d:hover {
      background: linear-gradient(135deg, rgba(138, 43, 226, 0.35) 0%, rgba(138, 43, 226, 0.15) 100%);
      box-shadow:
        inset 0 4px 6px rgba(255, 255, 255, 0.4),
        0 20px 40px rgba(0, 0, 0, 0.7),
        0 10px 25px rgba(138, 43, 226, 0.4),
        0 0 25px rgba(138, 43, 226, 0.6);
      border-color: rgba(138, 43, 226, 0.8);
      transform: translateY(-2px) translateZ(0);
    }

    .glass-button-3d:active {
      transform: translateY(10px) scale(0.95) translateZ(0);
      top: 0;
      box-shadow:
        inset 0 6px 12px rgba(0, 0, 0, 0.5),
        0 4px 8px rgba(138, 43, 226, 0.3),
        0 0 10px rgba(138, 43, 226, 0.5);
      filter: brightness(0.9);
      background: linear-gradient(135deg, rgba(138, 43, 226, 0.15) 0%, rgba(138, 43, 226, 0.02) 100%);
      border-color: rgba(138, 43, 226, 0.4);
    }

    .glass-button-3d svg,
    .glass-button-3d span {
      color: #FFFFFF !important;
      font-weight: 900 !important;
    }

    .category-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.8rem;
    }

    /* Tarjeta Vidrio 3D - Interfaz 2 */
    .glass-card-3d {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.04) 100%);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 2.2rem;
      box-shadow:
        inset 0 2px 4px rgba(255, 255, 255, 0.1),
        0 15px 35px rgba(0, 0, 0, 0.4),
        0 5px 15px rgba(0, 0, 0, 0.2);
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .glass-card-3d:hover {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.08) 100%);
      transform: translateY(-8px) scale(1.01);
      box-shadow:
        0 30px 60px rgba(0, 0, 0, 0.5),
        0 0 20px rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.4);
    }

    /* Botón de Acción Vidrio Mejorado y Luminoso */
    .glass-action-btn {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 1.6rem;
      box-shadow:
        inset 0 1px 2px rgba(255, 255, 255, 0.2),
        0 10px 20px rgba(0, 0, 0, 0.4);
      color: #FFFFFF !important;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.6);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      position: relative;
      overflow: hidden;
    }

    .glass-action-btn::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg,
          transparent 20%,
          rgba(255, 255, 255, 0.1) 48%,
          rgba(255, 255, 255, 0.3) 50%,
          rgba(255, 255, 255, 0.1) 52%,
          transparent 80%);
      transform: rotate(45deg);
      animation: shine-sweep 4s infinite;
      pointer-events: none;
    }

    @keyframes shine-sweep {
      0% {
        transform: translate(-100%, -100%) rotate(45deg);
      }

      20% {
        transform: translate(100%, 100%) rotate(45deg);
      }

      100% {
        transform: translate(100%, 100%) rotate(45deg);
      }
    }

    .luminous-glow {
      animation: luminous-pulse 3s ease-in-out infinite;
    }

    @keyframes luminous-pulse {

      0%,
      100% {
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), 0 0 10px rgba(255, 255, 255, 0.1);
      }

      50% {
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), 0 0 25px rgba(255, 255, 255, 0.3);
      }
    }

    .pulse-3d-btn {
      animation: pulse-3d 2.5s infinite;
      transform-origin: center center;
    }

    @keyframes pulse-3d {

      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 5px 15px rgba(0, 242, 255, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.4);
        border-color: rgba(0, 242, 255, 0.4);
      }

      50% {
        transform: scale(1.04);
        box-shadow: 0 15px 25px rgba(0, 242, 255, 0.6), inset 0 2px 2px rgba(255, 255, 255, 0.8);
        border-color: rgba(0, 255, 255, 0.8);
      }
    }

    /* Colores Específicos Luminosos */
    .btn-py {
      background: rgba(255, 0, 0, 0.15) !important;

    }

    .btn-fb:hover {

    }

    .btn-ig {

      border-color: rgba(225, 48, 108, 0.7) !important;
      box-shadow: 0 10px 25px rgba(225, 48, 108, 0.4), 0 0 15px rgba(225, 48, 108, 0.3);
    }

    .btn-ig:hover {
      background: linear-gradient(45deg, rgba(131, 58, 180, 0.55), rgba(225, 48, 108, 0.55), rgba(253, 216, 53, 0.55)) !important;
      box-shadow: 0 15px 35px rgba(225, 48, 108, 0.6);
    }

    .btn-tk {
      background: rgba(255, 255, 255, 0.25) !important;
      border-color: rgba(255, 255, 255, 0.5) !important;
      box-shadow: 0 10px 25px rgba(255, 255, 255, 0.3), 0 0 15px rgba(255, 255, 255, 0.2);
    }

    .btn-tk:hover {
      background: rgba(255, 255, 255, 0.4) !important;
      box-shadow: 0 15px 35px rgba(255, 255, 255, 0.4);
    }

    .btn-premium {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.05) 100%) !important;
      border-color: rgba(255, 255, 255, 0.5) !important;
      box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
    }

    .btn-premium:hover {
      box-shadow: 0 15px 40px rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.8) !important;
    }

    .btn-offers-glow {
      background: linear-gradient(135deg, rgba(0, 242, 255, 0.25) 0%, rgba(0, 242, 255, 0.1) 100%) !important;
      border-color: rgba(0, 242, 255, 0.5) !important;
      box-shadow: 0 10px 30px rgba(0, 242, 255, 0.2);
    }

    .btn-offers-glow:hover {
      box-shadow: 0 15px 40px rgba(0, 242, 255, 0.4);
      border-color: rgba(0, 242, 255, 1) !important;
    }

    .btn-blue {
      background: linear-gradient(135deg, rgba(0, 158, 227, 0.35) 0%, rgba(0, 158, 227, 0.15) 100%) !important;
      border-color: rgba(0, 158, 227, 0.6) !important;
      box-shadow: 0 10px 25px rgba(0, 158, 227, 0.3), 0 0 10px rgba(0, 158, 227, 0.2);
    }

    .btn-blue:hover {
      background: linear-gradient(135deg, rgba(0, 158, 227, 0.5) 0%, rgba(0, 158, 227, 0.25) 100%) !important;
      box-shadow: 0 15px 35px rgba(0, 158, 227, 0.5);
      border-color: rgba(0, 158, 227, 0.8) !important;
    }

    .btn-violet {
      background: linear-gradient(135deg, rgba(138, 43, 226, 0.35) 0%, rgba(138, 43, 226, 0.15) 100%) !important;
      border-color: rgba(138, 43, 226, 0.6) !important;
      box-shadow: 0 10px 25px rgba(138, 43, 226, 0.3), 0 0 10px rgba(138, 43, 226, 0.2);
    }

    .btn-violet:hover {
      background: linear-gradient(135deg, rgba(138, 43, 226, 0.5) 0%, rgba(138, 43, 226, 0.25) 100%) !important;
      box-shadow: 0 15px 35px rgba(138, 43, 226, 0.5);
      border-color: rgba(138, 43, 226, 0.8) !important;
    }

    .btn-green {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.35) 0%, rgba(34, 197, 94, 0.15) 100%) !important;
      border-color: rgba(34, 197, 94, 0.6) !important;
      box-shadow: 0 10px 25px rgba(34, 197, 94, 0.3), 0 0 10px rgba(34, 197, 94, 0.2);
    }

    .btn-green:hover {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.5) 0%, rgba(34, 197, 94, 0.25) 100%) !important;
      box-shadow: 0 15px 35px rgba(34, 197, 94, 0.5);
      border-color: rgba(34, 197, 94, 0.8) !important;
    }

    .card-neon-violet {
      background: linear-gradient(135deg, rgba(138, 43, 226, 0.15) 0%, rgba(138, 43, 226, 0.05) 100%) !important;
      border-color: rgba(138, 43, 226, 0.5) !important;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 20px rgba(138, 43, 226, 0.25) !important;
    }

    .card-neon-violet:hover {
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(138, 43, 226, 0.45) !important;
      border-color: rgba(138, 43, 226, 0.8) !important;
    }

    .card-neon-green {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.15) 0%, rgba(34, 197, 94, 0.05) 100%) !important;
      border-color: rgba(34, 197, 94, 0.5) !important;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 20px rgba(34, 197, 94, 0.25) !important;
    }

    .card-neon-green:hover {
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(34, 197, 94, 0.45) !important;
      border-color: rgba(34, 197, 94, 0.8) !important;
    }

    .card-neon-red {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.15) 0%, rgba(239, 68, 68, 0.05) 100%) !important;
      border-color: rgba(239, 68, 68, 0.5) !important;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 20px rgba(239, 68, 68, 0.25) !important;
    }

    .card-neon-red:hover {
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(239, 68, 68, 0.45) !important;
      border-color: rgba(239, 68, 68, 0.8) !important;
    }

    .glass-action-btn:active {
      transform: scale(0.95) translateY(2px);
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5);
    }

    /* Mobile-Specific Refinements for Android/Small Screens */
    @media (max-width: 400px) {
      .glass-card-3d {
        height: 165px !important;
        border-radius: 1.8rem !important;
      }

      .shop-image-wrapper {
        width: 110px !important;
      }

      .shop-title-text {
        font-size: 16px !important;
        letter-spacing: -0.02em !important;
        line-height: 1.1 !important;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .shop-address-sub {
        font-size: 8.5px !important;
        line-height: 1.2 !important;
      }

      .shop-btn-mobile {
        max-width: 140px !important;
        margin-left: auto !important;
        margin-right: auto !important;
        padding-top: 0.75rem !important;
        padding-bottom: 0.75rem !important;
        font-size: 9.5px !important;
      }

      .shop-stars-mobile {
        transform: scale(0.9);
        margin-bottom: 2px !important;
      }
    }
  </style>
